<a style='text-decoration:none' class='zisToTop kursor rounded-1 d-flex justify-content-center align-items-center' onclick='window.scrollTo({top: 0, behavior:"smooth"})'><i class="text-white ri-arrow-up-double-line ri-lg"></i></a>

<script>
document.addEventListener('scroll', function() {
  const toTop = document.querySelector('.zisToTop');
  if (!toTop) return;
  window.scrollY > 300 ? toTop.classList.add('show') : toTop.classList.remove('show');
});
</script>
